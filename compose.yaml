version: "3.8"

services:
  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: forge-engine
    ports:
      - "8000:8000"
    volumes:
      - ./data/workspaces:/data/workspaces
      - ./data/logs:/data/logs
      - ./config.yaml:/app/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - FORGE_CONFIG=/app/config.yaml
    depends_on:
      - registry
    networks:
      - forge-net
      - forge-internal
    restart: unless-stopped

  registry:
    build:
      context: ./registry
      dockerfile: Dockerfile
    container_name: forge-registry
    ports:
      - "8001:8001"
    volumes:
      - ./data/artifacts:/data/artifacts
      - ./data:/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - FORGE_CONFIG=/app/config.yaml
    networks:
      - forge-net
      - forge-internal
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: forge-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - engine
      - registry
    networks:
      - forge-net
    restart: unless-stopped

networks:
  forge-net:
    name: forge-net
    driver: bridge

  forge-internal:
    name: forge-internal
    driver: bridge
    internal: true

volumes:
  forge-data:
