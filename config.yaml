engine:
  host: "0.0.0.0"
  port: 8000
  max_concurrency: 4
  job_timeout_minutes: 30
  workspace_base: /data/workspaces
  log_base: /data/logs

registry:
  host: "0.0.0.0"
  port: 8001
  storage_path: /data/artifacts
  db_path: /data/registry.db

slack:
  webhook_url: ""
  enabled: false

auth:
  hash_algorithm: bcrypt
  token_length: 32

isolation:
  network_name: forge-internal
  default_cpu: 1.0
  default_memory: "512m"
  max_wall_clock_minutes: 30
  allowed_egress:
    - "registry:8001"
