name: build-lib-core
version: 1.0.0

jobs:
  build:
    runtime: alpine:3.18
    resources:
      cpu: 0.5
      memory: 256Mi
    steps:
      - name: create-source
        run: "mkdir -p src && echo 'lib-core source' > src/index.sh"
      - name: package
        run: "tar czf out.tar.gz src/"
        
artifacts:
  - name: lib-core
    version: 1.0.0
    path: ./out.tar.gz
